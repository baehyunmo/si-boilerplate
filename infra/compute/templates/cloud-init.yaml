#cloud-config
# =============================================================================
# Cloud-Init User Data — SI Boilerplate (Tier 1)
# =============================================================================
# Template variables (interpolated by Terraform):
#   ${hostname}    — instance hostname
#   ${timezone}    — system timezone (e.g., Asia/Seoul)
#   ${admin_user}  — admin username
#   ${ssh_pub_key} — SSH public key for admin user
# =============================================================================

hostname: ${hostname}
fqdn: ${hostname}.internal
manage_etc_hosts: true

timezone: ${timezone}

# -----------------------------------------------------------------------------
# Package Management
# -----------------------------------------------------------------------------
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - jq
  - unzip
  - python3
  - python3-pip
  - ca-certificates
  - gnupg
  - lsb-release
  - apt-transport-https
  - software-properties-common
  - docker.io
  - docker-compose
  - chrony
  - fail2ban
  - ufw

# -----------------------------------------------------------------------------
# User Configuration
# -----------------------------------------------------------------------------
users:
  - name: ${admin_user}
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_pub_key}

# -----------------------------------------------------------------------------
# Disk Setup (for attached data volumes)
# -----------------------------------------------------------------------------
disk_setup:
  /dev/vdb:
    table_type: gpt
    layout: true
    overwrite: false

fs_setup:
  - label: data
    filesystem: ext4
    device: /dev/vdb
    partition: auto
    overwrite: false

mounts:
  - ["/dev/vdb1", "/data", "ext4", "defaults,nofail", "0", "2"]

# -----------------------------------------------------------------------------
# Write Files
# -----------------------------------------------------------------------------
write_files:
  # Docker daemon configuration
  - path: /etc/docker/daemon.json
    owner: root:root
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "default-address-pools": [
          {"base": "172.17.0.0/12", "size": 24}
        ],
        "storage-driver": "overlay2",
        "live-restore": true
      }

  # Sysctl tuning
  - path: /etc/sysctl.d/99-si-tuning.conf
    owner: root:root
    permissions: "0644"
    content: |
      # VM tuning
      vm.swappiness = 10
      vm.dirty_ratio = 15
      vm.dirty_background_ratio = 5
      # Network tuning
      net.core.somaxconn = 65535
      net.core.netdev_max_backlog = 65535
      net.ipv4.tcp_max_syn_backlog = 65535
      net.ipv4.ip_local_port_range = 1024 65535
      net.ipv4.tcp_tw_reuse = 1
      net.ipv4.tcp_fin_timeout = 15
      # File descriptors
      fs.file-max = 2097152
      fs.inotify.max_user_watches = 524288

  # SSH hardening
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root:root
    permissions: "0600"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2

# -----------------------------------------------------------------------------
# Run Commands
# -----------------------------------------------------------------------------
runcmd:
  # Apply sysctl
  - sysctl --system

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Enable and configure chrony (NTP)
  - systemctl enable chrony
  - systemctl start chrony

  # Enable fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Basic firewall setup
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw --force enable

  # Restart SSH with hardened config
  - systemctl restart sshd

  # Create standard directories
  - mkdir -p /data/{apps,logs,backups}
  - chown -R ${admin_user}:${admin_user} /data

  # Signal cloud-init completion
  - echo "cloud-init complete" > /var/log/cloud-init-complete.marker

final_message: "System initialization complete after $UPTIME seconds."
