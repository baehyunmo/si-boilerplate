# =============================================================================
# Helmfile — Kubernetes Release Management — SI Boilerplate (Tier 1)
# =============================================================================
# Usage:
#   helmfile -e dev sync        # Deploy to dev
#   helmfile -e staging diff    # Preview changes for staging
#   helmfile -e production apply # Apply to production with diff confirmation
# =============================================================================

environments:
  dev:
    values:
      - environments/dev.yaml
    missingFileHandler: Warn
  staging:
    values:
      - environments/staging.yaml
    missingFileHandler: Warn
  production:
    values:
      - environments/production.yaml
    missingFileHandler: Warn

---

# =============================================================================
# Helm Repositories
# =============================================================================
repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

  - name: jetstack
    url: https://charts.jetstack.io

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  - name: grafana
    url: https://grafana.github.io/helm-charts

# =============================================================================
# Helm Plugin: diff (required for `helmfile diff` and `helmfile apply`)
# =============================================================================
helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true
  cleanupOnFail: true

# =============================================================================
# Releases
# =============================================================================
releases:
  # ---------------------------------------------------------------------------
  # Ingress Controller — NGINX
  # ---------------------------------------------------------------------------
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.11.3
    values:
      - controller:
          replicaCount: {{ env "INGRESS_REPLICAS" | default "2" }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          config:
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"
            use-proxy-protocol: "false"
            log-format-upstream: >-
              $remote_addr - $remote_user [$time_local] "$request"
              $status $body_bytes_sent "$http_referer" "$http_user_agent"
              $request_length $request_time [$proxy_upstream_name]
              [$proxy_alternative_upstream_name] $upstream_addr
              $upstream_response_length $upstream_response_time
              $upstream_status $req_id
          admissionWebhooks:
            enabled: true
      - defaultBackend:
          enabled: false
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args: ["create", "namespace", "ingress-nginx", "--dry-run=client", "-o", "yaml", "|", "kubectl", "apply", "-f", "-"]

  # ---------------------------------------------------------------------------
  # TLS Certificate Management — cert-manager
  # ---------------------------------------------------------------------------
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.16.2
    values:
      - installCRDs: true
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true
        # Webhook
        webhook:
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

  # ---------------------------------------------------------------------------
  # Monitoring Stack — kube-prometheus-stack
  # ---------------------------------------------------------------------------
  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 65.8.1
    values:
      # --- Prometheus --------------------------------------------------------
      - prometheus:
          prometheusSpec:
            retention: {{ env "PROMETHEUS_RETENTION" | default "15d" }}
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: {{ env "PROMETHEUS_STORAGE" | default "50Gi" }}
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # --- Grafana ---------------------------------------------------------
        grafana:
          enabled: true
          adminPassword: "CHANGE_ME_IN_VALUES"  # Override per environment
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          persistence:
            enabled: true
            size: 10Gi
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL

        # --- Alertmanager ----------------------------------------------------
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # --- Node Exporter ---------------------------------------------------
        nodeExporter:
          enabled: true

        # --- Kube State Metrics ----------------------------------------------
        kubeStateMetrics:
          enabled: true

        # --- Default rules ---------------------------------------------------
        defaultRules:
          create: true
          rules:
            alertmanager: true
            etcd: true
            general: true
            k8s: true
            kubeApiserver: true
            kubePrometheusNodeRecording: true
            kubernetesApps: true
            kubernetesResources: true
            kubernetesStorage: true
            kubeScheduler: true
            node: true
            prometheus: true
