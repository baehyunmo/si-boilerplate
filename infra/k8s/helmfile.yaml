# Helmfile — Kubernetes Release Management
# SI Boilerplate: Infrastructure Tier (Tier 1)
#
# Usage:
#   helmfile -e <environment> sync
#   helmfile -e <environment> diff

environments:
  dev:
    values:
      - environments/dev.yaml
  staging:
    values:
      - environments/staging.yaml
  production:
    values:
      - environments/production.yaml

---

repositories:
  # Add Helm chart repositories here
  # - name: bitnami
  #   url: https://charts.bitnami.com/bitnami

releases: []
